general {
    hide_cursor = true
}
background {
    path = screenshot
    blur_passes = 3
}
input-field {
    size = 300, 70
    outline_thickness = 2
    font_family = JetBrainsMono Nerd Font
    font_color = rgba(143, 143, 143, 1.0)
    inner_color = rgba(30, 30, 46, 1.0)
    outer_color = rgba(222, 187, 220, 1.0)
    check_color = rgba(249, 226, 175, 1.0)
    position = 0, -60
}
label {
    text = $TIME
    color = rgba(245, 194, 231, 1.0)
    font_size = 150
    font_family = JetBrainsMono Nerd Font Extrabold
    position = 0, 200
    halign = center
    valign = center
}
label {
    text = Hi there, $USER
    color = rgba(249, 226, 175, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold Italic
    position = 0, 10
    halign = center
    valign = center
}
